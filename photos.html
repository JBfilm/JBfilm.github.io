<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      background-color: black;
      color: white;
      font-family: Arial, sans-serif;
    }

    .gallery-item {
      text-align: center;
      margin: 80px auto;
      max-width: 800px;
    }

    .gallery-item img {
      width: 100%;
      max-width: 800px;
      height: auto;
    }

    .caption-title {
      margin-top: 15px;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .caption-meta {
      font-size: 12px;
      color: gray;
      margin-top: 5px;
    }
  </style>
</head>

<body>

  <div class="gallery-item">
    <img src="images/BigRed.jpeg" alt="Photo">
    <div class="caption-title">Your Caption Here</div>
    <div class="caption-meta">2026</div>
  </div>

</body>
</html>
