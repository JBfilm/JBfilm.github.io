<!DOCTYPE html>
<html>
<head>
  <title>Photos</title>
  <style>
    body {
      background: white;
      color: black;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 40px 20px;
    }

    .gallery-item {
      text-align: center;
      margin: 60px auto;
      max-width: 900px;
    }

    .gallery-item img {
      width: 100%;
      max-width: 800px;
      height: auto;
      display: block;
      margin: 0 auto;
    }

    .caption-title {
      margin-top: 14px;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: black;
    }

    .caption-meta {
      margin-top: 6px;
      font-size: 12px;
      color: gray;
    }
  </style>
</head>
<body>

  <div class="gallery-item">
    <img src="images/Gassignedit.JPEG" alt="Photo">
    <div class="caption-title">Your Caption Here</div>
    <div class="caption-meta">2026</div>
  </div>

</body>
</html>
