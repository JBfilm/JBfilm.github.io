<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>JB Film</title>

  <style>
    body {
      font-family: "Courier New", Courier, monospace;
      font-size: 16px;
      line-height: 1.8;
      background-color: white;
      color: #111;
      margin: 0;
      padding: 20px;
      text-align: center;
    }

    .hero {
      display: flex;
      justify-content: center;
      margin-bottom: 130px;
      margin-top: 10px;
    }

    #graphic-wrap {
      width: 340px;
      height: 340px;
      position: relative;
    }

    #graphic {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* subtle film grain over the graphic area */
    #graphic-wrap::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0.10;
      mix-blend-mode: multiply;
      background-image:
        radial-gradient(circle at 20% 30%, rgba(0,0,0,.12) 0 0.7px, transparent 0.9px),
        radial-gradient(circle at 75% 65%, rgba(0,0,0,.08) 0 0.6px, transparent 0.8px),
        radial-gradient(circle at 40% 80%, rgba(120,90,60,.08) 0 0.7px, transparent 1px),
        radial-gradient(circle at 65% 20%, rgba(0,0,0,.06) 0 0.7px, transparent 0.9px);
      background-size: 23px 23px, 31px 31px, 29px 29px, 27px 27px;
    }

    .section {
      margin-bottom: 95px;
    }

    a:link {
      color: #0000EE;
      text-decoration: underline;
    }

    a:visited {
      color: #551A8B;
    }

    a:hover,
    a:active {
      color: #FF0000;
    }
  </style>
</head>
<body>

  <div class="hero">
    <div id="graphic-wrap">
      <canvas id="graphic"></canvas>
    </div>
  </div>

  <div class="section">
    <a href="film.html">film.html</a>
  </div>

  <div class="section">
    <a href="photos.html">photos.html</a>
  </div>

  <div class="section">
    <a href="writing.html">writing.html</a>
  </div>

  <script type="module">
import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";

const canvas = document.getElementById("graphic");
const renderer = new THREE.WebGLRenderer({
  canvas,
  antialias: true,
  alpha: true
});

renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(35, 1, 0.1, 100);
camera.position.set(0, 0, 8);

function resize() {
  const wrap = document.getElementById("graphic-wrap");
  renderer.setSize(wrap.clientWidth, wrap.clientHeight, false);
  camera.aspect = 1;
  camera.updateProjectionMatrix();
}
resize();
window.addEventListener("resize", resize);

scene.add(new THREE.AmbientLight(0xffffff, 1.2));

const light1 = new THREE.DirectionalLight(0xffffff, 1.7);
light1.position.set(3, 2, 5);
scene.add(light1);

const light2 = new THREE.DirectionalLight(0xffe4c7, 0.7);
light2.position.set(-4, -1, 3);
scene.add(light2);

const medal = new THREE.Group();
scene.add(medal);

const textureLoader = new THREE.TextureLoader();

const noiseCanvas = document.createElement("canvas");
noiseCanvas.width = 512;
noiseCanvas.height = 512;
const ctx = noiseCanvas.getContext("2d");

for (let i = 0; i < 7000; i++) {
  const x = Math.random() * 512;
  const y = Math.random() * 512;
  const a = Math.random() * 0.08;
  ctx.fillStyle = `rgba(0,0,0,${a})`;
  ctx.fillRect(x, y, 1, 1);
}

const noiseTexture = new THREE.CanvasTexture(noiseCanvas);

const metalMaterial = new THREE.MeshStandardMaterial({
  color: 0xd3c3aa,
  roughness: 0.72,
  metalness: 0.08,
  map: noiseTexture
});

const rimMaterial = new THREE.MeshStandardMaterial({
  color: 0xe4d5be,
  roughness: 0.45,
  metalness: 0.04,
  map: noiseTexture
});

const thickness = 0.5;

const body = new THREE.Mesh(
  new THREE.CylinderGeometry(1.75, 1.75, thickness, 96),
  metalMaterial
);
body.rotation.z = Math.PI / 2;
medal.add(body);

const frontBevel = new THREE.Mesh(
  new THREE.CylinderGeometry(1.58, 1.68, 0.08, 96),
  rimMaterial
);
frontBevel.rotation.z = Math.PI / 2;
frontBevel.position.x = thickness / 2 + 0.03;
medal.add(frontBevel);

const frontRidge = new THREE.Mesh(
  new THREE.TorusGeometry(1.62, 0.08, 24, 120),
  rimMaterial
);
frontRidge.rotation.y = Math.PI / 2;
frontRidge.position.x = thickness / 2 + 0.05;
medal.add(frontRidge);

const backBevel = new THREE.Mesh(
  new THREE.CylinderGeometry(1.58, 1.68, 0.08, 96),
  rimMaterial
);
backBevel.rotation.z = Math.PI / 2;
backBevel.position.x = -(thickness / 2 + 0.03);
medal.add(backBevel);

const backRidge = new THREE.Mesh(
  new THREE.TorusGeometry(1.62, 0.08, 24, 120),
  rimMaterial
);
backRidge.rotation.y = Math.PI / 2;
backRidge.position.x = -(thickness / 2 + 0.05);
medal.add(backRidge);

const photoTexture = await textureLoader.loadAsync("JBFILMLOGO.JPG");
photoTexture.colorSpace = THREE.SRGBColorSpace;

const photoMaterial = new THREE.MeshStandardMaterial({
  map: photoTexture,
  roughness: 0.9,
  metalness: 0
});

const photo = new THREE.Mesh(
  new THREE.CircleGeometry(1.34, 96),
  photoMaterial
);

photo.rotation.y = Math.PI / 2;
photo.position.x = thickness / 2 + 0.07;
medal.add(photo);

const stainCanvas = document.createElement("canvas");
stainCanvas.width = 512;
stainCanvas.height = 512;
const sctx = stainCanvas.getContext("2d");

for (let i = 0; i < 2500; i++) {
  const x = Math.random() * 512;
  const y = Math.random() * 512;
  const a = Math.random() * 0.03;
  sctx.fillStyle = `rgba(90,60,30,${a})`;
  sctx.fillRect(x, y, 1, 1);
}

const stainTexture = new THREE.CanvasTexture(stainCanvas);

const stain = new THREE.Mesh(
  new THREE.CircleGeometry(1.34, 96),
  new THREE.MeshStandardMaterial({
    map: stainTexture,
    transparent: true,
    roughness: 1
  })
);

stain.rotation.y = Math.PI / 2;
stain.position.x = thickness / 2 + 0.072;
medal.add(stain);

medal.rotation.x = -0.10;
medal.rotation.z = 0.05;

function animate() {
  requestAnimationFrame(animate);

  medal.rotation.y -= 0.0045;   // slower spin

  renderer.render(scene, camera);
}

animate();
</script>

</body>
</html>
