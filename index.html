<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Your Name</title>

  <style>
    body {
      font-family: Verdana, Tahoma, Arial, sans-serif;
      font-size: 11px;
      line-height: 1.6;
      background-color: #f4f4f4;
      color: #111;
      margin: 0;
      padding: 40px 20px;
    }

    .container {
      max-width: 700px;
      margin: 0 auto;
      text-align: center;
    }

    .profile-photo {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      margin: 0 auto 40px auto;
      border: 1px solid #cfcfcf;
    }

    .section {
      text-align: left;
      margin-bottom: 35px;
    }

    h2 {
      font-size: 12px;
      font-weight: bold;
      margin-bottom: 6px;
      font-family: Tahoma, Verdana, Arial, sans-serif;
    }

    a {
      color: #0033cc;
      text-decoration: none;
      font-size: 11px;
    }

    a:hover {
      text-decoration: underline;
    }

    hr {
      border: none;
      border-top: 1px solid #d0d0d0;
      margin: 25px 0;
    }
  </style>
</head>
<body>

  <div class="container">

    <a href="index.html">
      <img src="yourphoto.jpg" alt="Profile Photo" class="profile-photo">
    </a>

    <div class="section">
      <h2>Film</h2>
      <a href="film.html">Enter Film</a>
    </div>

    <hr>

    <div class="section">
      <h2>Photos</h2>
      <a href="photos.html">Enter Photos</a>
    </div>

    <hr>

    <div class="section">
      <h2>Writing</h2>
      <a href="writing.html">Enter Writing</a>
    </div>

  </div>

</body>
</html>
